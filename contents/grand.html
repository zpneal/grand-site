<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yes/No Form to CSV</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .question { margin-bottom: 20px; }
    button { padding: 10px 15px; font-size: 16px; }
  </style>
</head>
<body>

<h2>Survey Form</h2>

<form id="surveyForm">
  <div class="question">
    <label>Do you like coffee?</label><br>
    <input type="radio" name="q1" value="yes" required> Yes
    <input type="radio" name="q1" value="no"> No
  </div>

  <div class="question">
    <label>Do you work remotely?</label><br>
    <input type="radio" name="q2" value="yes" required> Yes
    <input type="radio" name="q2" value="no"> No
  </div>

  <div class="question">
    <label>Do you use public transportation?</label><br>
    <input type="radio" name="q3" value="yes" required> Yes
    <input type="radio" name="q3" value="no"> No
  </div>

  <button type="button" onclick="generateCSV()">Download CSV</button>
</form>

<script>
function generateCSV() {
  const form = document.getElementById("surveyForm");

  const responses = {
    q1: form.q1.value,
    q2: form.q2.value,
    q3: form.q3.value
  };

  // Map responses to custom text
  const output = [
    {
      Question: "Coffee Preference",
      Answer: responses.q1,
      Note: responses.q1 === "yes" ? "User likes coffee" : "User does not like coffee"
    },
    {
      Question: "Work Style",
      Answer: responses.q2,
      Note: responses.q2 === "yes" ? "Works remotely" : "Does not work remotely"
    },
    {
      Question: "Transport Usage",
      Answer: responses.q3,
      Note: responses.q3 === "yes" ? "Uses public transport" : "Does not use public transport"
    }
  ];

  // Convert to CSV
  const headers = ["Question", "Answer", "Note"];
  const csvRows = [
    headers.join(","),
    ...output.map(row =>
      headers.map(field => `"${row[field]}"`).join(",")
    )
  ];

  const csvContent = csvRows.join("\n");

  // Download CSV
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", "survey_results.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
